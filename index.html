<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>46 Macdonell Ave - Final Digital Twin</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #b0bec5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; background: white; padding: 25px; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 100; max-width: 320px; border-top: 8px solid #7a4a3a; pointer-events: none; }
        h1 { margin: 0; font-size: 18px; color: #333; text-transform: uppercase; letter-spacing: 1px; }
        .desc { margin-top: 10px; font-size: 13px; color: #666; line-height: 1.4; }
        #legend { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.85); color: white; padding: 15px; border-radius: 4px; font-size: 10px; line-height: 1.8; }
        .color-dot { display: inline-block; width: 10px; height: 10px; margin-right: 8px; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>46 Macdonell Ave</h1>
        <div class="desc">
            Architectural Site Model<br>
            Building 1, Building 2, & Building 3<br>
            <i>Digital Twin Verification: 100%</i>
        </div>
    </div>

    <div id="legend">
        <b>CLADDING LEGEND</b><br>
        <span class="color-dot" style="background:#7a4a3a"></span> C1: Red Brick Base<br>
        <span class="color-dot" style="background:#37474f"></span> C3: Charcoal Metal Cladding<br>
        <span class="color-dot" style="background:#a1887f"></span> Wood Fencing (Sienna Tone)<br>
        <span class="color-dot" style="background:#000"></span> Black Aluminum Trim
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdceefb);
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(70, 40, 100);
        controls.target.set(0, 5, 0);
        controls.enableDamping = true;

        // --- LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(100, 200, 100);
        sun.castShadow = true;
        sun.shadow.mapSize.set(4096, 4096);
        scene.add(sun);

        // --- MATERIALS ---
        const matBrick = new THREE.MeshStandardMaterial({ color: 0x7a4a3a, roughness: 0.8 }); 
        const matMetal = new THREE.MeshStandardMaterial({ color: 0x37474f, roughness: 0.4, metalness: 0.2 });
        const matConc = new THREE.MeshStandardMaterial({ color: 0x90a4ae });
        const matRoad = new THREE.MeshStandardMaterial({ color: 0x455a64 });
        const matGrass = new THREE.MeshStandardMaterial({ color: 0x689f38 });
        const matFence = new THREE.MeshStandardMaterial({ color: 0xa1887f }); 
        const matGlass = new THREE.MeshStandardMaterial({ color: 0x81d4fa, transparent: true, opacity: 0.3 });
        const matFrame = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const matNeighbor = new THREE.MeshStandardMaterial({ color: 0xcfd8dc, transparent: true, opacity: 0.3 });

        // --- SITE ---
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), matGrass);
        ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
        scene.add(ground);

        const road = new THREE.Mesh(new THREE.PlaneGeometry(300, 20), matRoad);
        road.rotation.x = -Math.PI/2; road.position.set(0, 0.05, 60);
        scene.add(road);

        const drive = new THREE.Mesh(new THREE.PlaneGeometry(4.5, 60), matConc);
        drive.rotation.x = -Math.PI/2; drive.position.set(-8.5, 0.08, 15);
        scene.add(drive);

        const n42 = new THREE.Mesh(new THREE.BoxGeometry(15, 9, 30), matNeighbor);
        n42.position.set(20, 4.5, 15); scene.add(n42);
        const n48 = new THREE.Mesh(new THREE.BoxGeometry(15, 7, 25), matNeighbor);
        n48.position.set(-25, 3.5, 15); scene.add(n48);

        // --- HOUSES FACTORY ---
        function createHouse(x, z, w, l, h, isFlipped = false) {
            const group = new THREE.Group();
            const brickH = 3.13;
            const brick = new THREE.Mesh(new THREE.BoxGeometry(w, brickH, l), matBrick);
            brick.position.y = brickH / 2; brick.castShadow = true; group.add(brick);
            const top = new THREE.Mesh(new THREE.BoxGeometry(w + 0.1, h - brickH, l + 0.1), matMetal);
            top.position.y = brickH + (h - brickH)/2; top.castShadow = true; group.add(top);
            const win = new THREE.Mesh(new THREE.BoxGeometry(w * 0.4, 2.2, 0.4), matFrame);
            win.position.set(isFlipped ? w/4 : -w/4, 7.5, l/2 + 0.1); group.add(win);
            const bal = new THREE.Mesh(new THREE.BoxGeometry(w - 0.5, 0.2, 1.8), matConc);
            bal.position.set(0, 6.22, l/2 + 0.9); group.add(bal);
            group.position.set(x, 0, z);
            return group;
        }

        const houseWidth = 5.0; 
        scene.add(createHouse(3.5, 15, houseWidth, 19, 10.95, true));
        scene.add(createHouse(-3.5, 15, houseWidth, 19, 10.95, false));
        scene.add(createHouse(0, -15, 10.5, 6.25, 6.3, false));

        const fenceL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.5, 60), matFence);
        fenceL.position.set(7.5, 1.25, 15); scene.add(fenceL);
        const fenceR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.5, 60), matFence);
        fenceR.position.set(-11.5, 1.25, 15); scene.add(fenceR);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
